<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="premium-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer Glow Circle (optional, but adds depth) -->
  <circle cx="256" cy="256" r="230" fill="rgba(10, 10, 11, 0.8)" />
  
  <!-- Main Logo Shape: A stylized 'M' that evokes an open book and wings -->
  <path 
    d="M128 400 L128 160 C128 120 160 112 192 128 L256 160 L320 128 C352 112 384 120 384 160 L384 400 L320 368 L320 192 L256 224 L192 192 L192 368 Z" 
    fill="url(#premium-gradient)" 
    filter="url(#glow)"
  />
  
  <!-- Accent Dot/Core -->
  <circle cx="256" cy="270" r="15" fill="#D4AF37">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite" />
  </circle>
</svg>
